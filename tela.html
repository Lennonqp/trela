<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tela de recados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:#0A0608;
    color:#EDE6D6;
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }

  /* ---------- TELA DE SENHA ---------- */
  #gate{
    position:fixed; top:0; left:0; right:0; bottom:0; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 0%, #23130f 0%, #0A0608 60%);
    z-index:50;
  }
  .gate-card{
    width:100%; max-width:340px; padding:0 24px; text-align:center;
  }
  .gate-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:#E8933A; margin-bottom:10px;
  }
  .gate-card h1{
    font-family:'Fraunces', serif; font-weight:600;
    font-size:26px; margin:0 0 22px;
  }
  #senha{
    width:100%; padding:13px 14px; border-radius:10px;
    border:1px solid rgba(237,230,214,0.18);
    background:rgba(237,230,214,0.05);
    color:#EDE6D6; font-size:15px; text-align:center;
    font-family:'Inter', sans-serif;
  }
  #senha:focus{outline:none; border-color:#E8933A;}
  #entrar{
    width:100%; margin-top:12px; padding:13px; border:none; border-radius:10px;
    background:#E8933A; color:#1a1108; font-weight:600; font-size:14.5px;
    cursor:pointer;
  }
  #gateErro{
    margin-top:12px; font-size:12.5px; color:#d97a7a;
    font-family:'JetBrains Mono', monospace; min-height:14px;
  }

  /* ---------- PALCO ---------- */
  #palco{
    position:fixed; top:0; left:0; right:0; bottom:0; width:100%; height:100%;
    display:none;
    align-items:center; justify-content:center;
  }
  #idle{
    font-family:'JetBrains Mono', monospace;
    font-size:12px; letter-spacing:.16em; text-transform:uppercase;
    color:#5a4f45;
    display:flex; align-items:center; gap:10px;
  }
  #idle::before{
    content:""; width:6px; height:6px; border-radius:50%;
    background:#5a4f45; animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

  .curtain{
    position:fixed; top:0; bottom:0; width:52%;
    background:linear-gradient(90deg, #3a1414, #5c1f1f 40%, #3a1414);
    z-index:10;
    box-shadow: inset -20px 0 40px rgba(0,0,0,0.5);
  }
  .curtain.left{left:0; transform:translateX(0);}
  .curtain.right{right:0; transform:translateX(0);}
  .curtain.open.left{transform:translateX(-100%); transition:transform 1.1s cubic-bezier(.77,0,.18,1);}
  .curtain.open.right{transform:translateX(100%); transition:transform 1.1s cubic-bezier(.77,0,.18,1);}
  .curtain.close.left{transform:translateX(0); transition:transform .9s cubic-bezier(.77,0,.18,1);}
  .curtain.close.right{transform:translateX(0); transition:transform .9s cubic-bezier(.77,0,.18,1);}

  #reveal{
    max-width:720px;
    max-width:min(80vw, 720px);
    text-align:center;
    opacity:0;
    transform:scale(0.96);
    transition:opacity .5s ease .3s, transform .5s ease .3s;
  }
  #reveal.show{opacity:1; transform:scale(1);}

  .card-recado{
    background:#EDE6D6;
    color:#1a1108;
    border-radius:6px;
    padding:44px 40px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.7);
  }
  .card-recado.foto{padding:16px;}
  #msgTexto{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    font-size:clamp(22px, 3.4vw, 34px);
    line-height:1.3;
    margin:0;
    word-wrap:break-word;
  }
  #msgFoto{
    display:none;
    max-width:100%;
    max-height:70vh;
    border-radius:3px;
  }
  .eyebrow-recado{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:#5c1f1f; margin-bottom:16px;
  }

  #timerWrap{
    margin-top:26px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  #timerWrap svg{transform:rotate(-90deg);}
  #timerNum{
    font-family:'JetBrains Mono', monospace;
    font-size:13px; color:#9c8f80; letter-spacing:.05em;
  }
</style>
</head>
<body>

  <div id="gate">
    <div class="gate-card">
      <div class="gate-eyebrow">Acesso restrito</div>
      <h1>Tela de recados</h1>
      <input type="password" id="senha" placeholder="Senha" autocomplete="off">
      <button id="entrar">Entrar</button>
      <div id="gateErro"></div>
    </div>
  </div>

  <div id="palco">
    <div id="idle">Aguardando recados</div>

    <div class="curtain left"></div>
    <div class="curtain right"></div>

    <div id="reveal">
      <div class="card-recado" id="cardRecado">
        <div class="eyebrow-recado">Recado anônimo</div>
        <p id="msgTexto"></p>
        <img id="msgFoto">
      </div>
      <div id="timerWrap">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <circle cx="11" cy="11" r="9" fill="none" stroke="rgba(237,230,214,0.15)" stroke-width="2.5"/>
          <circle id="ring" cx="11" cy="11" r="9" fill="none" stroke="#E8933A" stroke-width="2.5"
            stroke-dasharray="56.5" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <span id="timerNum">10s</span>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const SENHA_CORRETA = "praviversempedirlicença";

  const gate = document.getElementById('gate');
  const palco = document.getElementById('palco');
  const senhaInput = document.getElementById('senha');
  const gateErro = document.getElementById('gateErro');

  function tentarEntrar(){
    if (senhaInput.value === SENHA_CORRETA){
      gate.style.display = 'none';
      palco.style.display = 'flex';
      sessionStorage.setItem('tela_autenticada', '1');
      iniciarEscuta();
    } else {
      gateErro.textContent = 'Senha incorreta.';
      senhaInput.value = '';
    }
  }

  document.getElementById('entrar').addEventListener('click', tentarEntrar);
  senhaInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tentarEntrar(); });

  // Evita pedir senha de novo se a pessoa só atualizar a página na mesma aba/sessão
  if (sessionStorage.getItem('tela_autenticada') === '1'){
    gate.style.display = 'none';
    palco.style.display = 'flex';
    iniciarEscuta();
  }

  // ---------- LÓGICA DE EXIBIÇÃO ----------
  // Fila real (array), não uma única "próxima" — assim, se vários recados
  // chegarem enquanto um já está na tela, TODOS entram na fila e são
  // exibidos em ordem, um depois do outro, sem pular nenhum.
  let jaEscutando = false;
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let fila = [];
  const vistos = new Set(); // ids já enfileirados/exibidos, pra nunca duplicar
  let baselineId = 0; // id mais recente que já existia quando a tela foi aberta

  async function iniciarEscuta(){
    if (jaEscutando) return;
    jaEscutando = true;

    // Antes de começar a ouvir, marca o recado mais recente que já existe
    // no banco como "ponto de partida" fixo, pra tela não exibir de uma vez
    // todo o histórico antigo assim que é aberta.
    try {
      const { data } = await sb.from('recados').select('id').order('id', { ascending: false }).limit(1);
      if (data && data.length) baselineId = data[0].id;
    } catch (e) { console.error('Falha ao buscar último id', e); }

    sb.channel('recados-tela')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'recados' }, (payload) => {
        enfileirar(payload.new);
      })
      .subscribe((status) => {
        // Sempre que a conexão em tempo real (re)conecta, faz uma
        // varredura pra buscar qualquer recado que possa ter chegado
        // enquanto a conexão estava caindo/reconectando.
        if (status === 'SUBSCRIBED') buscarPendentes();
      });

    // Varredura de segurança periódica: garante que nenhum recado fique
    // pra trás mesmo se a TV perder a conexão em tempo real por um instante
    // (comum quando várias pessoas mandam recado ao mesmo tempo pelo celular).
    // Sempre busca a partir do mesmo ponto de partida fixo (baselineId) e
    // deixa o Set "vistos" filtrar o que já foi enfileirado — assim, mesmo
    // que um recado chegue fora de ordem, ele nunca fica pra trás de vez.
    setInterval(buscarPendentes, 4000);
  }

  async function buscarPendentes(){
    try {
      const { data, error } = await sb
        .from('recados')
        .select('*')
        .gt('id', baselineId)
        .order('id', { ascending: true });
      if (error) throw error;
      if (data) data.forEach(enfileirar);
    } catch (e) { console.error('Falha na varredura de pendentes', e); }
  }

  // Pequena janela de espera antes de começar a exibir, usada só quando a
  // tela está ociosa. Se vários aparelhos mandarem recado quase ao mesmo
  // tempo, essa pausa dá tempo de todos chegarem e entrarem na fila antes
  // de a exibição começar — assim a ordem sai certa (pelo id, que é a
  // ordem real de chegada no banco) mesmo que a rede entregue um recado
  // um pouco antes do outro.
  const JANELA_AGRUPAMENTO_MS = 700;
  let aguardandoLote = false;

  // Adiciona um recado à fila, evitando duplicatas (via o Set "vistos") e
  // mantendo a ordem pelo id (gerado pelo banco na ordem real de chegada —
  // mais confiável do que confiar no relógio de cada aparelho, que pode
  // estar dessincronizado). Reordena a fila a cada novo recado, então
  // mesmo que dois cheguem fora de ordem, saem na tela em ordem certa.
  function enfileirar(data){
    if (vistos.has(data.id)) return;
    vistos.add(data.id);
    fila.push(data);
    fila.sort((a, b) => a.id - b.id);

    if (!emExibicao && !aguardandoLote){
      aguardandoLote = true;
      setTimeout(() => { aguardandoLote = false; processarFila(); }, JANELA_AGRUPAMENTO_MS);
    }
  }

  function processarFila(){
    if (fila.length === 0) return;
    const proximo = fila.shift();
    mostrarRecado(proximo);
  }

  const idleEl = document.getElementById('idle');
  const leftCurtain = document.querySelector('.curtain.left');
  const rightCurtain = document.querySelector('.curtain.right');
  const revealEl = document.getElementById('reveal');
  const cardRecado = document.getElementById('cardRecado');
  const msgTexto = document.getElementById('msgTexto');
  const msgFoto = document.getElementById('msgFoto');
  const ring = document.getElementById('ring');
  const timerNum = document.getElementById('timerNum');

  let emExibicao = false;

  function mostrarRecado(data){
    emExibicao = true;
    idleEl.style.display = 'none';

    if (data.tipo === 'texto'){
      msgTexto.style.display = 'block';
      msgFoto.style.display = 'none';
      cardRecado.classList.remove('foto');
      msgTexto.textContent = data.conteudo;
    } else {
      msgTexto.style.display = 'none';
      msgFoto.style.display = 'block';
      cardRecado.classList.add('foto');
      msgFoto.src = data.conteudo;
    }

    leftCurtain.classList.add('open');
    rightCurtain.classList.add('open');

    setTimeout(() => revealEl.classList.add('show'), 100);

    // countdown 10s
    const total = 10;
    let restante = total;
    timerNum.textContent = restante + 's';
    ring.style.strokeDashoffset = '0';

    const circunferencia = 56.5;
    const intervalo = setInterval(() => {
      restante -= 1;
      timerNum.textContent = Math.max(restante, 0) + 's';
      const offset = circunferencia * (1 - restante / total);
      ring.style.strokeDashoffset = offset;
      if (restante <= 0){
        clearInterval(intervalo);
        esconderRecado();
      }
    }, 1000);
  }

  function esconderRecado(){
    revealEl.classList.remove('show');
    leftCurtain.classList.remove('open');
    rightCurtain.classList.remove('open');
    leftCurtain.classList.add('close');
    rightCurtain.classList.add('close');

    setTimeout(() => {
      leftCurtain.classList.remove('close');
      rightCurtain.classList.remove('close');
      idleEl.style.display = 'flex';
      emExibicao = false;
      if (fila.length > 0){
        setTimeout(processarFila, 400);
      }
    }, 950);
  }
</script>
</body>
</html>
